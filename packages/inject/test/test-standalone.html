<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Clash Inject - 注入脚本生成器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      min-height: 100vh; padding: 40px 20px;
    }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { color: white; text-align: center; margin-bottom: 10px; font-size: 2.2rem; }
    .subtitle { color: rgba(255,255,255,0.9); text-align: center; margin-bottom: 30px; }
    .card {
      background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .card h2 { color: #333; margin-bottom: 15px; font-size: 1.2rem; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; color: #666; margin-bottom: 5px; font-size: 0.9rem; }
    .form-group select, .form-group input {
      width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 1rem;
    }
    .form-group select:focus, .form-group input:focus {
      outline: none; border-color: #11998e;
    }
    .code-block {
      background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 8px;
      font-family: 'Consolas', monospace; font-size: 0.85rem;
      overflow-x: auto; white-space: pre-wrap; word-break: break-all;
    }
    .btn {
      padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9rem;
      font-weight: 500; cursor: pointer; transition: all 0.2s; margin-right: 10px;
    }
    .btn-primary { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(17,153,142,0.4); }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .nav-links { text-align: center; margin-bottom: 20px; }
    .nav-links a { color: white; text-decoration: none; margin: 0 10px; opacity: 0.9; }
    .nav-links a:hover { opacity: 1; }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: white; padding: 12px 24px;
      border-radius: 8px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 注入脚本生成器</h1>
    <p class="subtitle">自定义配置生成专属注入代码</p>

    <div class="nav-links">
      <a href="/">← 返回首页</a>
      <a href="/test-esm.html">ESM 测试 →</a>
    </div>

    <div class="card">
      <h2>配置选项</h2>

      <div class="form-group">
        <label>Provider (AI 平台)</label>
        <select id="provider">
          <option value="deepseek">DeepSeek</option>
          <option value="doubao">豆包</option>
          <option value="qianwen">通义千问</option>
          <option value="longcat">LongCat (天工)</option>
          <option value="yuanbao">腾讯元宝</option>
        </select>
      </div>

      <div class="form-group">
        <label>适配器类型</label>
        <select id="adapter">
          <option value="window">Window (全局变量 window.__AI_CLASH)</option>
          <option value="extension">Extension (Chrome 扩展消息)</option>
          <option value="broadcast">BroadcastChannel (跨标签页通信)</option>
        </select>
      </div>

      <div class="form-group">
        <label>全局变量名称 (仅 Window 适配器)</label>
        <input type="text" id="globalName" value="__AI_CLASH" placeholder="__AI_CLASH">
      </div>

      <div class="form-group">
        <label>服务器地址</label>
        <input type="text" id="serverUrl" value="http://localhost:5173/standalone.js" placeholder="http://localhost:5173/standalone.js">
      </div>

      <button class="btn btn-primary" onclick="generateCode()">生成代码</button>
      <button class="btn btn-secondary" onclick="resetForm()">重置</button>
    </div>

    <div class="card">
      <h2>📜 注入代码</h2>
      <div class="code-block" id="output">// 点击"生成代码"按钮生成</div>
      <div style="margin-top: 15px;">
        <button class="btn btn-primary" onclick="copyCode()">📋 复制</button>
        <button class="btn btn-secondary" onclick="createBookmarklet()">🔖 创建书签</button>
      </div>
    </div>

    <div class="card">
      <h2>📝 使用说明</h2>
      <ol style="color: #666; line-height: 1.8; padding-left: 20px;">
        <li>打开目标 AI 网站（如 DeepSeek）</li>
        <li>按 F12 打开开发者工具</li>
        <li>复制上方生成的代码到 Console</li>
        <li>按回车执行</li>
        <li>使用 <code>window.__AI_CLASH</code> 调用能力</li>
      </ol>
    </div>
  </div>

  <div class="toast" id="toast">已复制</div>

  <script>
    function generateCode() {
      const provider = document.getElementById('provider').value;
      const adapter = document.getElementById('adapter').value;
      const globalName = document.getElementById('globalName').value;
      const serverUrl = document.getElementById('serverUrl').value;

      const code = `javascript:(async function(){
  // 加载注入脚本
  if(!window.AIClashInject){
    const s=document.createElement('script');
    s.src='${serverUrl}';
    await new Promise(r=>{s.onload=r;document.head.appendChild(s);});
  }

  // 创建注入器
  const inj=window.AIClashInject.createInjector({
    provider:'${provider}',
    adapter:'${adapter}'${adapter === 'window' && globalName ? `,\n    globalName:'${globalName}'` : ''}
  });

  // 执行注入
  await inj.inject();
  console.log('✅ AI Clash Inject 已注入');
  console.log('📡 使用', window.${globalName || '__AI_CLASH'}, '调用能力');
})();`;

      document.getElementById('output').textContent = code;
    }

    function resetForm() {
      document.getElementById('provider').value = 'deepseek';
      document.getElementById('adapter').value = 'window';
      document.getElementById('globalName').value = '__AI_CLASH';
      document.getElementById('serverUrl').value = 'http://localhost:5173/standalone.js';
      generateCode();
    }

    function copyCode() {
      const code = document.getElementById('output').textContent;
      navigator.clipboard.writeText(code).then(() => showToast());
    }

    function createBookmarklet() {
      const code = document.getElementById('output').textContent.replace(/^javascript:/, '');
      const bookmarklet = 'javascript:' + encodeURIComponent(code);

      const w = window.open('', '_blank', 'width=600,height=400');
      w.document.write(`
        <html><head><title>Bookmarklet</title>
        <meta charset="utf-8">
        <style>
          body{font-family:sans-serif;padding:20px;}
          h2{color:#11998e;}
          .box{background:#f5f5f5;padding:15px;border-radius:8px;margin:15px 0;}
          .btn{display:inline-block;padding:10px 20px;background:#11998e;color:white;
               text-decoration:none;border-radius:6px;}
          code{word-break:break-all;font-size:0.8rem;}
        </style></head><body>
        <h2>🔖 创建书签</h2>
        <div class="box">
          <p><strong>方法 1：</strong> 拖动下方按钮到书签栏</p>
          <a class="btn" href="${bookmarklet}">AI Clash Inject</a>
        </div>
        <div class="box">
          <p><strong>方法 2：</strong> 手动创建书签，复制以下代码到 URL 字段</p>
          <code>${bookmarklet}</code>
        </div>
        </body></html>
      `);
    }

    function showToast() {
      document.getElementById('toast').classList.add('show');
      setTimeout(() => document.getElementById('toast').classList.remove('show'), 2000);
    }

    // 初始生成
    generateCode();
  </script>
</body>
</html>
