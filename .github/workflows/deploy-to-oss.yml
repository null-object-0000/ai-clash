name: Deploy to OSS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Install ossutil
        run: |
          wget -q https://gosspublic.alicdn.com/ossutil/1.7.14/ossutil64 -O ossutil
          chmod +x ossutil
          sudo mv ossutil /usr/local/bin/

      - name: Upload to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_SECRET_ACCESS_KEY: ${{ secrets.OSS_SECRET_ACCESS_KEY }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        run: |
          OSS_BUCKET="ai-clash"
          OSS_TARGET="oss://${OSS_BUCKET}/"

          ossutil sync dist/ ${OSS_TARGET} \
            --update \
            --delete \
            -e ${OSS_ENDPOINT} \
            -i "${OSS_ACCESS_KEY_ID}" \
            -k "${OSS_SECRET_ACCESS_KEY}"

          echo "✅ 部署完成！"
          echo "🌐 访问地址：https://ai-clash.snewbie.site"
